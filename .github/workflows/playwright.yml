name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: ${{ matrix.project }} | shard ${{ matrix.shard }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        project: [chrome, webkit, iphone, pixel]
        shard: ["1/2", "2/2"]

    env:
      APP_BASE_URL: ${{ vars.APP_BASE_URL }}
      API_BASE_URL: ${{ vars.API_BASE_URL }}
      TEST_API_KEY: ${{ secrets.TEST_API_KEY }}
      ALLOW_TEST_CONTROL_API: ${{ vars.ALLOW_TEST_CONTROL_API }}
      TEST_USER_USERNAME: ${{ vars.TEST_USER_USERNAME }}
      TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
      TEST_USER_EMAIL: ${{ vars.TEST_USER_EMAIL }}
      TEST_COUPON_CODE: ${{ vars.TEST_COUPON_CODE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit chrome

      - name: Run critical tests
        run: npx playwright test --grep "@critical" --project="${{ matrix.project }}" --shard="${{ matrix.shard }}"

      - name: Upload debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.project }}-${{ matrix.shard }}
          path: |
            test-results/
            playwright-report/
            allure-results/
          if-no-files-found: ignore
          retention-days: 14
