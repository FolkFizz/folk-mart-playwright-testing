name: Playwright Tests

on:
  workflow_dispatch:
    inputs:
      app_base_url:
        description: "Frontend base URL"
        required: true
        type: string
        default: "https://folk-mart-1.onrender.com"
      api_base_url:
        description: "Backend API base URL"
        required: true
        type: string
        default: "https://folk-mart.onrender.com"
      allow_test_control_api:
        description: "Allow test-control endpoints"
        required: true
        type: choice
        options:
          - "false"
          - "true"
        default: "false"
      test_user_username:
        description: "Seeded test username"
        required: true
        type: string
        default: "user"
      test_user_email:
        description: "Seeded test user email"
        required: true
        type: string
        default: "user@folkmart.com"
      test_coupon_code:
        description: "Default coupon code"
        required: true
        type: string
        default: "WELCOME10"

jobs:
  test:
    name: ${{ matrix.project }} | shard ${{ matrix.shard }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        project: [chrome, webkit, iphone, pixel]
        shard: ["1/2", "2/2"]

    env:
      APP_BASE_URL: ${{ inputs.app_base_url }}
      API_BASE_URL: ${{ inputs.api_base_url }}
      TEST_API_KEY: ${{ secrets.TEST_API_KEY }}
      ALLOW_TEST_CONTROL_API: ${{ inputs.allow_test_control_api }}
      TEST_USER_USERNAME: ${{ inputs.test_user_username }}
      TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
      TEST_USER_EMAIL: ${{ inputs.test_user_email }}
      TEST_COUPON_CODE: ${{ inputs.test_coupon_code }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit chrome

      - name: Run critical tests
        run: npx playwright test --grep "@critical" --project="${{ matrix.project }}" --shard="${{ matrix.shard }}"

      - name: Upload debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.project }}-${{ matrix.shard }}
          path: |
            test-results/
            playwright-report/
            allure-results/
          if-no-files-found: ignore
          retention-days: 14
